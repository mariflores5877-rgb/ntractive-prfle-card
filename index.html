<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name=" description" content="Interactive profile card" />
    <title>Profile Card</title>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="card__avatar-container">
          <img src="" alt="" class="card__avatar" />
        </div>
        <div class="card__info">
          <h1 class="card__name">Marisol Flores</h1>
          <p class="card__title">Software Engineer</p>
          <p class="card__bio">I am an intelligent and collaborative person</p>
        </div>

        <div class="card__links">
          <a href="" class="card__link">GitHub</a>
          <a href="" class="card__link">LinkedIn</a>
        </div>

        <button class="card__btn" type="button">Edit Profile</button>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
